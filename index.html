<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindState AI — Deploy AI agents that actually move the business</title>
  <meta name="description" content="MindState builds and ships custom AI agents for enterprise sales, ops and support teams. Measurable ROI in weeks, not quarters." />
  <link rel="icon" href="assets/mark-clean.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=GT+Sectra:ital@0;1&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "accent": "warm",
      "serif": "Geist",
      "gradientIntensity": 100
    }/*EDITMODE-END*/;
  </script>

  <script src="i18n.js"></script>
</head>
<body>
  <div id="root"></div>

  <div id="tweaks-panel" aria-hidden="true">
    <h5>Tweaks <span>live</span></h5>
    <label>Theme
      <select id="tweak-theme">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </label>
    <label>Accent palette
      <div class="swatch-row" id="tweak-accent">
        <div class="swatch" data-val="warm" style="background:linear-gradient(135deg,#F5822E,#C43A92)"></div>
        <div class="swatch" data-val="cool" style="background:linear-gradient(135deg,#3E7BFA,#8A4BFF)"></div>
        <div class="swatch" data-val="mono" style="background:linear-gradient(135deg,#0E0E0C,#56544F)"></div>
        <div class="swatch" data-val="green" style="background:linear-gradient(135deg,#1F7A5E,#3FB86E)"></div>
      </div>
    </label>
    <label>Display typeface
      <select id="tweak-serif">
        <option value="Geist">Geist (sans)</option>
        <option value="Inter Tight">Inter Tight</option>
        <option value="GT Sectra">GT Sectra (serif)</option>
        <option value="Fraunces">Fraunces (serif)</option>
      </select>
    </label>
    <label>Gradient intensity
      <input type="range" id="tweak-grad" min="0" max="100" value="100" />
    </label>
  </div>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components-top.jsx"></script>
  <script type="text/babel" src="components-agents.jsx"></script>
  <script type="text/babel" src="components-rest.jsx"></script>

  <script type="text/babel">
    function App() {
      const { lang, setLang, t } = useT();
      useReveal();
      return (
        <>
          <Nav t={t} lang={lang} setLang={setLang} />
          <Hero t={t} />
          <Logos t={t} />
          <Services t={t} />
          <Intelligo t={t} />
          <Sovereignty t={t} />
          <Compare t={t} />
          <Company t={t} />
          <CTA t={t} />
          <Footer t={t} />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // ---- Tweaks wiring ----
    const state = Object.assign({}, TWEAK_DEFAULTS);
    const accentMap = {
      warm:  { a1: "#F5822E", a2: "#EF4D7A", a3: "#C43A92" },
      cool:  { a1: "#3E7BFA", a2: "#6B6BFF", a3: "#8A4BFF" },
      mono:  { a1: "#2B2A27", a2: "#56544F", a3: "#0E0E0C" },
      green: { a1: "#3FB86E", a2: "#2A8A50", a3: "#1F7A5E" },
    };
    const serifMap = {
      "Geist": "'Geist', -apple-system, sans-serif",
      "Inter Tight": "'Inter Tight', sans-serif",
      "GT Sectra": "'GT Sectra', 'Instrument Serif', serif",
      "Fraunces": "'Fraunces', serif",
    };
    function applyTweaks() {
      const r = document.documentElement;
      r.setAttribute("data-theme", state.theme);
      const a = accentMap[state.accent] || accentMap.warm;
      r.style.setProperty("--accent-1", a.a1);
      r.style.setProperty("--accent-2", a.a2);
      r.style.setProperty("--accent-3", a.a3);
      r.style.setProperty("--serif", serifMap[state.serif] || serifMap["Geist"]);
      r.style.setProperty("--sans", serifMap[state.serif] || serifMap["Geist"]);

      // gradient intensity: grayscale the gradient text by intensity
      const grad = state.gradientIntensity / 100;
      document.querySelectorAll(".hero-display em").forEach(el => {
        el.style.filter = `saturate(${grad})`;
      });

      // load Google Font if needed
      const fam = state.serif;
      if (fam !== "Geist" && fam !== "Inter Tight" && fam !== "GT Sectra") {
        const id = "gf-" + fam.replace(/ /g, "-");
        if (!document.getElementById(id)) {
          const l = document.createElement("link");
          l.id = id;
          l.rel = "stylesheet";
          l.href = `https://fonts.googleapis.com/css2?family=${fam.replace(/ /g, "+")}:ital,wght@0,400;0,500;0,600;0,700&display=swap`;
          document.head.appendChild(l);
        }
      }
    }
    applyTweaks();

    // Tweaks panel wiring
    function initPanel() {
      const panel = document.getElementById("tweaks-panel");
      if (!panel) return;
      const tTheme = document.getElementById("tweak-theme");
      const tSerif = document.getElementById("tweak-serif");
      const tGrad = document.getElementById("tweak-grad");
      const accentRow = document.getElementById("tweak-accent");

      tTheme.value = state.theme;
      tSerif.value = state.serif;
      tGrad.value = state.gradientIntensity;
      accentRow.querySelectorAll(".swatch").forEach(s => {
        s.classList.toggle("active", s.dataset.val === state.accent);
      });

      const persist = (edits) => {
        Object.assign(state, edits);
        applyTweaks();
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits }, "*");
      };

      tTheme.addEventListener("change", () => persist({ theme: tTheme.value }));
      tSerif.addEventListener("change", () => persist({ serif: tSerif.value }));
      tGrad.addEventListener("input", () => persist({ gradientIntensity: +tGrad.value }));
      accentRow.querySelectorAll(".swatch").forEach(s => {
        s.addEventListener("click", () => {
          accentRow.querySelectorAll(".swatch").forEach(x => x.classList.remove("active"));
          s.classList.add("active");
          persist({ accent: s.dataset.val });
        });
      });
    }

    // Edit mode protocol
    window.addEventListener("message", (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") {
        document.getElementById("tweaks-panel").classList.add("open");
        initPanel();
      } else if (e.data.type === "__deactivate_edit_mode") {
        document.getElementById("tweaks-panel").classList.remove("open");
      }
    });
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
  </script>
</body>
</html>
